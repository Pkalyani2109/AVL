<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Janatics Workspace Launcher</title>
    <style>
      :root {
        --bg1: #0f1f3d;
        --bg2: #11355e;
        --card: rgba(255, 255, 255, 0.12);
        --card-border: rgba(255, 255, 255, 0.25);
        --text: #f7fbff;
        --muted: #d8e7fb;
        --btn: #ffffff;
        --btn-text: #0f2b53;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1000px 500px at 10% -10%, rgba(255,255,255,0.18), transparent 55%),
          radial-gradient(1200px 700px at 100% 100%, rgba(22,157,255,0.25), transparent 60%),
          linear-gradient(145deg, var(--bg1), var(--bg2));
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        padding: 28px;
        border-radius: 18px;
        border: 1px solid var(--card-border);
        background: var(--card);
        backdrop-filter: blur(8px);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }
      h1 { margin: 0 0 8px; font-size: clamp(1.4rem, 2vw, 2rem); }
      p { margin: 0 0 18px; color: var(--muted); }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      a {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid transparent;
      }
      .primary {
        background: var(--btn);
        color: var(--btn-text);
        font-weight: 700;
      }
      .ghost {
        color: var(--text);
        border-color: rgba(255,255,255,0.4);
      }
      .hint {
        margin-top: 14px;
        font-size: 0.95rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Janatics + Dealer Tools</h1>
      <p>Select the app you want to open.</p>
      <div class="actions">
        <a class="primary" href="./src/janatics_part_number_generator_all_products.html">Open Product Code Generator</a>
        <a class="ghost" href="./src-dealer-tracker/index.html">Open Dealer Growth Tracker</a>
      </div>
      <p class="hint">This repo is deployment-ready as a static site.</p>
    </main>
  </body>
</html>
